<div class="organizer" style="width: 545px;">
  <div style="padding: 10px 0;">
    {% if page.website %}
    <h3 class="organizer-name no_anchor">
      <a href="{{ page.website }}">{{ page.name }}</a>
    </h3>
    {% else %}
    <h3 class="organizer-name no_anchor">
      {{ page.name }}
    </h3>
    {% endif %}
    {% if page.affiliation %}
    <p>{{ page.affiliation }}</p>
    {% endif %}
    {% if page.role %}
    <p class="organizer-meta">{{ page.role }}</p>
    {% endif %}
    {{ content }}
  </div>
</div>
